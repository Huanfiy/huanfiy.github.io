<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}
  </title>

  <!-- SEO Meta Tags -->
  <meta
    name="description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
  />
  <meta name="author" content="{{ site.author }}" />
  <meta
    name="keywords"
    content="{% if page.tags %}{{ page.tags | join: ', ' }}{% endif %}"
  />

  <!-- Open Graph -->
  <meta
    property="og:title"
    content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}"
  />
  <meta
    property="og:description"
    content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}"
  />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:type" content="website" />

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    href="{{ '/picture/icon.png' | relative_url }}"
  />

  <!-- CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;600&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}" />

  <!-- JavaScript Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/marked@4.0.12/marked.min.js"></script>

  {% seo %} {% feed_meta %}
</head>
