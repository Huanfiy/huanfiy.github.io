<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                const savedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const theme = savedTheme || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (error) {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
    <title>博客 - Huanfly</title>
    <meta name="description" content="Huanfly 的技术博客：嵌入式开发、调试方法论、工程实践与成长复盘。">
    <meta name="author" content="Huanfly">
    <link rel="canonical" href="https://huanfly.com/blog.html">
    <meta property="og:type" content="website">
    <meta property="og:title" content="博客 - Huanfly">
    <meta property="og:description" content="嵌入式开发、调试方法论、工程实践与成长复盘。">
    <meta property="og:url" content="https://huanfly.com/blog.html">
    <meta property="og:site_name" content="Huanfly的空间">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:image" content="https://huanfly.com/picture/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="theme-color" content="#5da844">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="picture/icon.png">
    <link rel="apple-touch-icon" href="picture/icon-192.png">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-screen-webfont@1.7.0/style.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Marked.js 用于解析 Markdown (主CDN + 备用CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.0.12/marked.min.js"></script>
    <script>
        // 如果主 CDN 加载失败，尝试备用 CDN
        if (typeof marked === 'undefined') {
            document.write('<script src="https://unpkg.com/marked@4.0.12/marked.min.js"><\/script>');
        }
    </script>
    <script>
        // 二次检查，如果仍然失败，尝试 cdnjs
        if (typeof marked === 'undefined') {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.0.12/marked.min.js"><\/script>');
        }
    </script>
</head>
<body>

    <header>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="picture/icon.png" alt="Logo">
                <span>Huanfly</span>
            </a>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
            <nav class="nav-links">
                <a href="index.html">主页</a>
                <a href="blog.html" class="active">博客</a>
                <a href="tool.html">工具</a>
                <a href="about.html">关于</a>
                <button class="theme-toggle" aria-label="切换主题" title="切换主题">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <!-- 列表展示区域 -->
    <main id="blog-list-view" class="container page">
        <h2 class="section-title" data-aos="fade-up">最新文章</h2>

        <div class="blog-toolbar" data-aos="fade-up">
            <div class="blog-search">
                <i class="fas fa-search"></i>
                <input type="text" id="blog-search-input" placeholder="搜索文章标题、简介或标签…">
            </div>
            <!-- 标签筛选：由 JS 根据 posts.json 动态生成 -->
            <div class="filter-chips" id="blog-filter-chips"></div>
        </div>

        <div class="blog-list" id="blog-cards-grid">
            <!-- 文章卡片由 JS 从 posts.json 动态渲染 -->
            <div class="loading-block">
                <i class="fas fa-spinner fa-spin fa-2x"></i>
                <p>加载文章列表...</p>
            </div>
        </div>
    </main>

    <!-- 文章详情阅读区域 (默认隐藏) -->
    <div id="blog-detail-view" class="container page" style="display: none;">
        <button onclick="closeMarkdown()" class="btn btn-outline btn-back">
            <i class="fas fa-arrow-left"></i> 返回列表
        </button>
        <article id="markdown-content" class="markdown-body">
            <!-- Markdown 内容将渲染在这里 -->
        </article>
    </div>

    <footer>
        <div class="container">
            <p class="footer-note">&copy; 2026 Huanfly. 保留所有权利。</p>
            <p class="footer-note"><a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">粤ICP备2025388790号</a></p>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // === 默认配图：基于 tag 生成 SVG 渐变图 ===
        const TAG_GRADIENTS = {
            'Git':   ['#8fa8e8', '#a58cd4'],
            'Linux': ['#5cbfa2', '#8fe0a8'],
            '随笔':  ['#eeb0b8', '#ffe3e8'],
            '前端':  ['#f2bb66', '#ffe08a'],
            '后端':  ['#7ec3f2', '#8ae6f2'],
            '嵌入式': ['#6ba8d9', '#7d94d9'],
            '调试':  ['#5cc98a', '#63cfc4'],
            '工程实践': ['#f2ad66', '#e8837a'],
            '成长':  ['#a58cd4', '#c39aec'],
            '感悟':  ['#f28a8f', '#f7b980'],
        };
        const DEFAULT_GRADIENT = ['#5da844', '#4fc4cf'];

        function getCoverUrl(post) {
            if (post.cover) return post.cover;
            const [c1, c2] = TAG_GRADIENTS[post.tag] || DEFAULT_GRADIENT;
            const label = post.tag || 'Blog';
            const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250">
                <defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/>
                </linearGradient></defs>
                <rect width="400" height="250" fill="url(#g)"/>
                <text x="200" y="135" text-anchor="middle" fill="white" font-size="28"
                      font-family="sans-serif" opacity="0.7">${label}</text>
            </svg>`;
            return 'data:image/svg+xml,' + encodeURIComponent(svg);
        }

        // === 动态渲染文章卡片 ===
        function renderBlogCards(posts) {
            const grid = document.getElementById('blog-cards-grid');
            if (!posts.length) {
                grid.innerHTML = '<div class="loading-block"><i class="far fa-folder-open fa-2x"></i><p>没有找到相关文章</p></div>';
                return;
            }
            grid.innerHTML = posts.map((post, i) => `
                <article class="card blog-card" data-aos="fade-up" data-aos-delay="${Math.min(i, 4) * 80}"
                         onclick="openPost('${post.file}')">
                    <div class="blog-thumb">
                        <img src="${getCoverUrl(post)}" alt="${post.title || post.tag || '文章'}"
                             class="${post.coverFit === 'contain' ? 'contain' : ''}"
                             width="320" height="180" loading="${i < 3 ? 'eager' : 'lazy'}" decoding="async">
                    </div>
                    <div class="blog-card-body">
                        <div class="blog-meta">
                            <span><i class="far fa-calendar"></i> ${post.date}</span>
                            ${post.tag ? `<span class="blog-tag">${post.tag}</span>` : ''}
                        </div>
                        <h3 class="blog-title">${post.title}</h3>
                        <p class="blog-summary">${post.summary || ''}</p>
                        <div class="blog-readmore">阅读全文</div>
                    </div>
                </article>
            `).join('');
            AOS.refresh();
        }

        let allPosts = [];
        let activeTag = '全部';

        // === 标签筛选 + 搜索 联动 ===
        function applyFilters() {
            const keyword = document.getElementById('blog-search-input').value.toLowerCase();
            const filtered = allPosts.filter(post =>
                (activeTag === '全部' || post.tag === activeTag) &&
                ((post.title && post.title.toLowerCase().includes(keyword)) ||
                 (post.tag && post.tag.toLowerCase().includes(keyword)) ||
                 (post.summary && post.summary.toLowerCase().includes(keyword)) ||
                 !keyword)
            );
            renderBlogCards(filtered);
        }

        function renderFilterChips(posts) {
            const tags = ['全部', ...new Set(posts.map(p => p.tag).filter(Boolean))];
            const box = document.getElementById('blog-filter-chips');
            box.innerHTML = tags.map(tag =>
                `<button class="filter-chip${tag === activeTag ? ' active' : ''}" data-tag="${tag}">${tag}</button>`
            ).join('');
            box.querySelectorAll('.filter-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    activeTag = chip.dataset.tag;
                    box.querySelectorAll('.filter-chip').forEach(c => c.classList.toggle('active', c === chip));
                    applyFilters();
                });
            });
        }

        // 页面加载时拉取文章清单
        fetch('posts/posts.json')
            .then(r => { if (!r.ok) throw new Error('加载失败'); return r.json(); })
            .then(posts => {
                allPosts = posts;
                renderFilterChips(posts);
                renderBlogCards(posts);
            })
            .catch(() => {
                document.getElementById('blog-cards-grid').innerHTML =
                    '<div class="error-block"><i class="fas fa-exclamation-triangle fa-2x"></i><p>文章列表加载失败，请刷新重试</p></div>';
            });

        // === Hash 路由：文章可直链分享，浏览器后退可返回列表 ===
        function openPost(file) {
            location.hash = 'post=' + encodeURIComponent(file);
        }

        function handleHashRoute() {
            const match = location.hash.match(/^#post=(.+)$/);
            if (match) {
                loadMarkdown(decodeURIComponent(match[1]));
            } else {
                document.getElementById('blog-detail-view').style.display = 'none';
                document.getElementById('blog-list-view').style.display = 'block';
                setTimeout(() => AOS.refresh(), 100);
            }
        }

        window.addEventListener('hashchange', handleHashRoute);
        if (location.hash.startsWith('#post=')) handleHashRoute();

        // 搜索功能
        document.getElementById('blog-search-input').addEventListener('input', applyFilters);

        // === 剥离 Front Matter ===
        function stripFrontMatter(text) {
            if (!text.startsWith('---')) return text;
            const end = text.indexOf('\n---', 3);
            if (end === -1) return text;
            return text.substring(end + 4).trimStart();
        }

        // === 加载并渲染 Markdown 文章 ===
        function loadMarkdown(file) {
            const contentDiv = document.getElementById('markdown-content');
            contentDiv.innerHTML = '<div class="loading-block"><i class="fas fa-spinner fa-spin fa-2x"></i><p>加载中...</p></div>';

            document.getElementById('blog-list-view').style.display = 'none';
            document.getElementById('blog-detail-view').style.display = 'block';
            window.scrollTo(0, 0);

            if (typeof marked === 'undefined') {
                contentDiv.innerHTML = `<div class="error-block">
                    <i class="fas fa-exclamation-triangle fa-2x"></i>
                    <p>Markdown 解析库加载失败</p>
                    <p style="font-size:0.9rem;">请检查网络连接后刷新页面</p>
                </div>`;
                return;
            }

            fetch(file)
                .then(response => {
                    if (!response.ok) throw new Error('文章加载失败');
                    return response.text();
                })
                .then(text => {
                    contentDiv.innerHTML = marked.parse(stripFrontMatter(text));
                })
                .catch(error => {
                    contentDiv.innerHTML = `<div class="error-block">
                        <i class="fas fa-exclamation-triangle"></i> 文章加载出错: ${error.message}
                    </div>`;
                });
        }

        function closeMarkdown() {
            // pushState 清空 hash 不触发 hashchange，视图在下方手动切回
            history.pushState('', document.title, location.pathname + location.search);
            document.getElementById('blog-detail-view').style.display = 'none';
            document.getElementById('blog-list-view').style.display = 'block';
            setTimeout(() => AOS.refresh(), 100);
        }
    </script>
</body>
</html>
