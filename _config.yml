# 网站的基本信息
title: "Huanfiy的技术博客"
description: "专注于技术分享与实用工具开发的个人博客"
author: "Huanfiy"
email: "your-email@example.com"
baseurl: ""
url: "https://your-domain.com"  # 改为你的域名

# 社交媒体链接
social:
  github: "https://github.com/Huanfiy"
  bilibili: "https://space.bilibili.com/179895513"

# 选择主题 (云服务器部署不需要GitHub Pages主题)
# theme: "jekyll-theme-cayman"

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# 分页设置
paginate: 6
paginate_path: "/blog/page:num/"

# 集合配置
collections:
  posts:
    output: true
    permalink: /:collection/:name/
  tools:
    output: true
    permalink: /:collection/:name/

# 默认配置
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Huanfiy"
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"

# Markdown 处理器
markdown: kramdown
highlighter: rouge

# Kramdown 配置
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Sass 配置
sass:
  style: compressed
  sass_dir: _sass

# 构建设置
permalink: /:year/:month/:day/:title/

# 排除文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - deploy.sh
  - Makefile
  - .gitignore
  - LICENSE

# 包含文件
include:
  - _pages

# 压缩设置（生产环境）
compress_html:
  clippings: all
  comments: all
  endings: all
  startings: []
  blanklines: false
  profile: false

# 时区
timezone: Asia/Shanghai

# 开发设置
livereload: true
incremental: true

# SEO 设置
lang: zh-CN
locale: zh_CN

# 站点地图设置
sitemap:
  exclude:
    - "/404.html"
