<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>键位练习 - Haunfly</title>
    <link rel="icon" type="image/png" href="../picture/icon.png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ---- Page Layout ---- */
        .practice-wrapper {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 20px 4rem;
        }

        .page-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
            color: var(--dark-text);
        }

        .page-subtitle {
            text-align: center;
            color: var(--light-text);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* ---- Mode Selector (pill buttons) ---- */
        .mode-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 2rem;
        }

        .mode-btn {
            padding: 7px 16px;
            border-radius: 50px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            color: var(--light-text);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }

        .mode-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .mode-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* ---- Stats Bar ---- */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 1.5rem;
        }

        .stat-item { text-align: center; }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.78rem;
            color: var(--light-text);
            margin-top: 2px;
        }

        /* ---- Practice Area ---- */
        .practice-area {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            text-align: center;
            min-height: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(0,0,0,0.02);
            user-select: none;
            transition: opacity 0.15s;
        }

        /* Key Queue */
        .key-queue-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            margin-bottom: 1rem;
            min-height: 34px;
            overflow: hidden;
        }

        .queue-separator {
            width: 2px;
            height: 24px;
            background: var(--border-color);
            margin: 0 6px;
            border-radius: 1px;
            flex-shrink: 0;
        }

        .queue-key {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 30px;
            height: 30px;
            padding: 0 8px;
            border-radius: 6px;
            font-size: 0.78rem;
            font-weight: 700;
            font-family: 'Nunito', monospace;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .queue-key.done-correct {
            background: #e3f9e5;
            color: #27ae60;
        }

        .queue-key.done-wrong {
            background: #fde8e8;
            color: #e74c3c;
            text-decoration: line-through;
        }

        .queue-key.upcoming {
            background: #f0f2f5;
            color: var(--light-text);
        }

        .queue-key.upcoming.reinforced {
            background: #fff7ed;
            color: #c2410c;
            border: 1px solid #fdba74;
            box-shadow: inset 0 0 0 1px rgba(251, 146, 60, 0.2);
        }

        .queue-key.upcoming.reinforced::after {
            content: '*';
            font-size: 0.62rem;
            margin-left: 3px;
            opacity: 0.8;
        }

        /* Current Key */
        .current-key-display {
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.2rem;
        }

        .current-key-display .key-label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 32px;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border-radius: var(--radius-md);
            box-shadow: 0 6px 20px rgba(106, 176, 76, 0.3);
            animation: pulse-glow 2s ease-in-out infinite;
            min-width: 90px;
            letter-spacing: 1px;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 6px 20px rgba(106, 176, 76, 0.25); }
            50% { box-shadow: 0 6px 30px rgba(106, 176, 76, 0.45); }
        }

        .current-key-display .key-label.correct-flash {
            animation: correct-flash 0.35s ease;
        }

        .current-key-display .key-label.wrong-flash {
            animation: wrong-flash 0.4s ease;
        }

        .current-key-display .key-label.error-state {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            box-shadow: 0 8px 28px rgba(231, 76, 60, 0.46);
            transform: scale(1.08);
            animation: error-hold-pulse 0.9s ease-in-out infinite;
        }

        .current-key-display .key-label.error-state.wrong-flash {
            animation: wrong-flash 0.4s ease;
        }

        @keyframes correct-flash {
            0% { background: linear-gradient(135deg, #2ecc71, #27ae60); transform: scale(1.1); }
            100% { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); transform: scale(1); }
        }

        @keyframes wrong-flash {
            0%, 30% { background: linear-gradient(135deg, #e74c3c, #c0392b); transform: scale(0.93); }
            60% { transform: scale(1.06); }
            100% { background: linear-gradient(135deg, var(--primary-color), var(--accent-color)); transform: scale(1); }
        }

        @keyframes error-hold-pulse {
            0%, 100% { transform: scale(1.06); }
            50% { transform: scale(1.12); }
        }

        .start-prompt {
            color: var(--light-text);
            font-size: 1.1rem;
            font-weight: 600;
        }

        /* Progress Bar */
        .progress-bar {
            width: 100%;
            max-width: 420px;
            height: 5px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ---- Virtual Keyboard ---- */
        .keyboard-container {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,0,0,0.02);
            overflow-x: auto;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            min-width: 680px;
        }

        .kb-row {
            display: flex;
            gap: 4px;
        }

        .kb-key {
            min-width: 42px;
            height: 42px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 7px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: default;
            transition: all 0.12s;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
            line-height: 1.1;
        }

        .kb-key .shift-char {
            font-size: 0.58rem;
            opacity: 0.45;
            line-height: 1;
        }

        .kb-key.w1 { min-width: 64px; }
        .kb-key.w2 { min-width: 84px; }
        .kb-key.w3 { min-width: 56px; }
        .kb-key.space-key { min-width: 250px; }

        /* Finger zone colors */
        .f-lp { background: #f0e4f8; }
        .f-lr { background: #e1ecfa; }
        .f-lm { background: #d9f2e8; }
        .f-li { background: #f8f2db; }
        .f-ri { background: #f8eadb; }
        .f-rm { background: #d9f2e8; }
        .f-rr { background: #e1ecfa; }
        .f-rp { background: #f0e4f8; }
        .f-th { background: #e2f5e2; }

        /* Target highlight */
        .kb-key.target {
            background: var(--primary-color) !important;
            color: white !important;
            transform: scale(1.1);
            box-shadow: 0 3px 14px rgba(106, 176, 76, 0.45);
            border-color: var(--primary-color) !important;
            z-index: 2;
        }

        .kb-key.target.target-wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            border-color: #dc2626 !important;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.55);
            transform: scale(1.14);
            animation: kb-target-error-pulse 0.8s ease-in-out infinite;
        }

        .kb-key.target .shift-char {
            opacity: 1;
            color: rgba(255,255,255,0.85);
        }

        /* Press animation */
        .kb-key.pressed {
            transform: translateY(2px) scale(0.94);
            box-shadow: none !important;
            transition: all 0.06s;
        }

        .kb-key.wrong-press {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.25), 0 8px 16px rgba(239, 68, 68, 0.32) !important;
            animation: kb-wrong-press 0.22s cubic-bezier(0.2, 0.9, 0.2, 1);
            z-index: 3;
        }

        @keyframes kb-target-error-pulse {
            0%, 100% { transform: scale(1.12); }
            50% { transform: scale(1.17); }
        }

        @keyframes kb-wrong-press {
            0% { transform: translateY(0) scale(1); }
            40% { transform: translateY(-7px) scale(1.08); }
            100% { transform: translateY(0) scale(1); }
        }

        /* Heatmap */
        .kb-key.heat-1 { background: #fef3c7 !important; border-color: #fcd34d !important; }
        .kb-key.heat-2 { background: #fdba74 !important; border-color: #f97316 !important; }
        .kb-key.heat-3 { background: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }

        /* ---- Weak Keys Panel ---- */
        .weak-keys-panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .weak-keys-title {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--dark-text);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .weak-key-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .weak-key-name {
            min-width: 48px;
            font-weight: 700;
            font-size: 0.85rem;
            text-align: center;
            padding: 3px 8px;
            background: #fde8e8;
            border-radius: 6px;
            color: #e74c3c;
        }

        .weak-key-bar {
            flex: 1;
            height: 7px;
            background: var(--border-color);
            border-radius: 4px;
            overflow: hidden;
        }

        .weak-key-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #f97316, #ef4444);
        }

        .weak-key-rate {
            font-size: 0.8rem;
            color: var(--light-text);
            min-width: 55px;
            text-align: right;
        }

        /* ---- Session Stats Panel ---- */
        .session-stats-panel {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 1.2rem 1.5rem;
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
            border: 1px solid rgba(0,0,0,0.02);
        }

        .session-stats-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-bottom: 0.9rem;
        }

        .session-range-group {
            display: inline-flex;
            border: 1px solid var(--border-color);
            border-radius: 999px;
            overflow: hidden;
            background: #f7f8fa;
        }

        .range-btn {
            border: none;
            background: transparent;
            color: var(--light-text);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .range-btn:hover { color: var(--primary-color); }

        .range-btn.active {
            background: var(--primary-color);
            color: #fff;
        }

        .session-summary-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 0.65rem;
            margin-bottom: 1rem;
        }

        .summary-card {
            background: #f8faf9;
            border: 1px solid #ebf0ed;
            border-radius: 10px;
            padding: 0.68rem 0.75rem;
        }

        .summary-value {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.1;
        }

        .summary-label {
            margin-top: 2px;
            color: var(--light-text);
            font-size: 0.74rem;
        }

        .trend-card {
            border: 1px solid #edf2ef;
            border-radius: 12px;
            padding: 0.7rem 0.75rem 0.85rem;
            background: linear-gradient(180deg, #fcfefc 0%, #f8fcfa 100%);
        }

        .trend-legend {
            display: flex;
            align-items: center;
            gap: 0.95rem;
            flex-wrap: wrap;
            margin-bottom: 0.45rem;
            color: var(--light-text);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .legend-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
        }

        .legend-dot.acc { background: #16a34a; }
        .legend-dot.kpm { background: #2563eb; }

        .trend-chart {
            width: 100%;
            min-height: 220px;
        }

        .trend-chart svg {
            width: 100%;
            height: 220px;
            display: block;
        }

        .trend-empty {
            margin: 0.55rem 0 0.2rem;
            color: var(--light-text);
            font-size: 0.82rem;
            text-align: center;
        }

        /* ---- Controls ---- */
        .controls-bar {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .controls-bar .btn {
            font-size: 0.9rem;
            padding: 8px 20px;
        }

        /* ---- Completion Overlay ---- */
        .completion-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.35);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .completion-overlay.show { display: flex; }

        .completion-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 2.5rem 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            animation: slide-up 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slide-up {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .completion-card h2 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: var(--dark-text);
        }

        .completion-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
        }

        .comp-stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-color);
        }

        .comp-stat-label {
            font-size: 0.78rem;
            color: var(--light-text);
        }

        .completion-weak-keys {
            margin-bottom: 1.5rem;
            min-height: 30px;
        }

        .comp-tip {
            margin-top: -0.2rem;
            margin-bottom: 1rem;
            color: var(--light-text);
            font-size: 0.8rem;
        }

        .comp-wrong-tag {
            display: inline-block;
            padding: 4px 10px;
            margin: 3px;
            background: #fde8e8;
            color: #e74c3c;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.82rem;
        }

        .comp-perfect {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1rem;
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .page-title { font-size: 1.4rem; }
            .stats-bar { gap: 1.2rem; }
            .stat-value { font-size: 1.1rem; }
            .current-key-display .key-label { font-size: 2.2rem; padding: 10px 24px; }
            .keyboard { min-width: 580px; }
            .kb-key { min-width: 34px; height: 34px; font-size: 0.62rem; }
            .kb-key.w1 { min-width: 52px; }
            .kb-key.w2 { min-width: 68px; }
            .kb-key.w3 { min-width: 46px; }
            .kb-key.space-key { min-width: 190px; }
            .mode-btn { font-size: 0.78rem; padding: 6px 12px; }
            .session-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .range-btn { font-size: 0.72rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <a href="../index.html" class="logo">
                <img src="../picture/icon.png" alt="Logo">
                <span>Haunfly</span>
            </a>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
            <nav class="nav-links">
                <a href="../index.html">主页</a>
                <a href="../blog.html">博客</a>
                <a href="../tool.html" class="active">工具</a>
                <a href="../about.html">关于</a>
            </nav>
        </div>
    </header>

    <main class="practice-wrapper">
        <h1 class="page-title">键位练习</h1>
        <p class="page-subtitle">错则停留，直到打对；系统会持续强化你的弱键位</p>

        <!-- Mode Selector -->
        <div class="mode-selector" id="mode-selector">
            <button class="mode-btn active" data-mode="homeRow">基础行</button>
            <button class="mode-btn" data-mode="topRow">上行</button>
            <button class="mode-btn" data-mode="bottomRow">下行</button>
            <button class="mode-btn" data-mode="numberRow">数字行</button>
            <button class="mode-btn" data-mode="shiftCombo">Shift 组合</button>
            <button class="mode-btn" data-mode="funcKeys">功能键</button>
            <button class="mode-btn" data-mode="allKeys">全键混合</button>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="stat-accuracy">-</div>
                <div class="stat-label">准确率</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-progress">0/0</div>
                <div class="stat-label">进度</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-time">0:00</div>
                <div class="stat-label">用时</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="stat-kpm">-</div>
                <div class="stat-label">键/分</div>
            </div>
        </div>

        <!-- Practice Area -->
        <div class="practice-area" id="practice-area" tabindex="0">
            <div class="key-queue-wrapper">
                <div id="done-keys" style="display:flex;gap:4px;"></div>
                <div class="queue-separator" id="queue-sep" style="display:none;"></div>
                <div id="upcoming-keys" style="display:flex;gap:4px;"></div>
            </div>
            <div class="current-key-display" id="current-key-display">
                <span class="start-prompt">点击此处并按下任意键开始</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width:0%"></div>
            </div>
        </div>

        <!-- Virtual Keyboard -->
        <div class="keyboard-container">
            <div class="keyboard" id="virtual-keyboard"></div>
        </div>

        <!-- Weak Keys Panel -->
        <div class="weak-keys-panel" id="weak-keys-panel" style="display:none;">
            <div class="weak-keys-title">
                <i class="fas fa-exclamation-triangle" style="color:#f97316;"></i>
                需要加强的键位
            </div>
            <div id="weak-keys-list"></div>
        </div>

        <!-- Session Stats Panel -->
        <div class="session-stats-panel" id="session-stats-panel" style="display:none;">
            <div class="session-stats-header">
                <div class="weak-keys-title" style="margin-bottom:0;">
                    <i class="fas fa-chart-line" style="color:#2563eb;"></i>
                    进步统计
                </div>
                <div class="session-range-group" id="session-range-group">
                    <button class="range-btn active" data-range="20">近20轮</button>
                    <button class="range-btn" data-range="50">近50轮</button>
                    <button class="range-btn" data-range="all">全部</button>
                </div>
            </div>
            <div class="session-summary-grid">
                <div class="summary-card">
                    <div class="summary-value" id="sum-total-sessions">0</div>
                    <div class="summary-label">总轮次</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="sum-best-accuracy">-</div>
                    <div class="summary-label">最佳准确率</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="sum-best-kpm">-</div>
                    <div class="summary-label">最佳键/分</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="sum-recent-accuracy">-</div>
                    <div class="summary-label">近7轮平均准确率</div>
                </div>
            </div>
            <div class="trend-card">
                <div class="trend-legend">

    <script src="../js/script.js"></script>
    <script>
    // =========================================================
    //  键位练习 - 全键位覆盖 & 智能弱键强化
    // =========================================================

    // ===== Constants =====
    const BASE_SEQ_LEN = 25;
    const MAX_SEQ_LEN = 100;
    const STORAGE_KEY = 'keyboard_practice_stats';
    const SESSION_STORAGE_KEY = 'keyboard_practice_sessions';
    const SESSION_META_STORAGE_KEY = 'keyboard_practice_session_meta';
    const SESSION_META_VERSION = 1;
    const SESSION_RENDER_MAX_POINTS = 240;
    const MODIFIERS = new Set(['Shift', 'Control', 'Alt', 'Meta']);
    const WEIGHT_CONFIG = {
        longTermFactor: 4.2,
        streakFactor: 1.45,
        debtFactor: 1.0,
        streakCap: 5,
        debtCap: 12
    };
    const REINFORCE_CONFIG = {
        minGap: 3,
        maxGap: 8,
        maxPendingPerKey: 2,
        maxQueueSize: 14
    };

    // Display name mapping for special keys
    const DISPLAY_NAME = {
        ' ': 'Space', 'Control': 'Ctrl', 'Backspace': 'Back',
        'CapsLock': 'Caps', 'Tab': 'Tab', 'Enter': 'Enter',
        'Shift': 'Shift', 'Alt': 'Alt'
    };

    // Shift-symbol → base key (for keyboard highlight)
    const SHIFT_BASE = {
        '~':'`','!':'1','@':'2','#':'3','$':'4','%':'5',
        '^':'6','&':'7','*':'8','(':'9',')':'0','_':'-',
        '+':'=','{':'[','}':']','|':'\\',':':';','"':"'",
        '<':',','>':'.','?':'/'
    };

    // ===== Key Pools =====
    const POOLS = {
        homeRow:    ['a','s','d','f','g','h','j','k','l',';',"'"],
        topRow:     ['q','w','e','r','t','y','u','i','o','p','[',']','\\'],
        bottomRow:  ['z','x','c','v','b','n','m',',','.','/'],
        numberRow:  ['`','1','2','3','4','5','6','7','8','9','0','-','='],
        shiftCombo: [
            '~','!','@','#','$','%','^','&','*','(',')','_','+',
            '{','}','|',':','"','<','>','?',
            ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')
        ],
        funcKeys:   ['Tab','CapsLock','Shift','Control','Alt','Enter','Backspace',' ']
    };
    const MODE_LABELS = {
        homeRow: '基础行',
        topRow: '上行',
        bottomRow: '下行',
        numberRow: '数字行',
        shiftCombo: 'Shift 组合',
        funcKeys: '功能键',
        allKeys: '全键混合'
    };

    function getAllKeys() {
        return [
            ...POOLS.homeRow, ...POOLS.topRow, ...POOLS.bottomRow,
            ...POOLS.numberRow, ...POOLS.shiftCombo, ...POOLS.funcKeys
        ];
    }

    // ===== Keyboard Layout Definition =====
    // [dataKey, label, shiftLabel, fingerClass, widthClass]
    const KB_ROWS = [
        [ // Number row
            ['`','`','~','f-lp',''],['1','1','!','f-lp',''],['2','2','@','f-lr',''],
            ['3','3','#','f-lm',''],['4','4','$','f-li',''],['5','5','%','f-li',''],
            ['6','6','^','f-ri',''],['7','7','&','f-ri',''],['8','8','*','f-rm',''],
            ['9','9','(','f-rr',''],['0','0',')','f-rp',''],['-','-','_','f-rp',''],
            ['=','=','+','f-rp',''],['Backspace','Back','','f-rp','w2']
        ],
        [ // Top row
            ['Tab','Tab','','f-lp','w1'],['q','Q','','f-lp',''],['w','W','','f-lr',''],
            ['e','E','','f-lm',''],['r','R','','f-li',''],['t','T','','f-li',''],
            ['y','Y','','f-ri',''],['u','U','','f-ri',''],['i','I','','f-rm',''],
            ['o','O','','f-rr',''],['p','P','','f-rp',''],['[','[','{','f-rp',''],
            [']',']','}','f-rp',''],['\\','\\','|','f-rp','w1']
        ],
        [ // Home row
            ['CapsLock','Caps','','f-lp','w2'],['a','A','','f-lp',''],['s','S','','f-lr',''],
            ['d','D','','f-lm',''],['f','F','','f-li',''],['g','G','','f-li',''],
            ['h','H','','f-ri',''],['j','J','','f-ri',''],['k','K','','f-rm',''],
            ['l','L','','f-rr',''],[';',';',':','f-rp',''],["'","'",'"','f-rp',''],
            ['Enter','Enter','','f-rp','w2']
        ],
        [ // Bottom row
            ['Shift','Shift','','f-lp','w2'],['z','Z','','f-lp',''],['x','X','','f-lr',''],
            ['c','C','','f-lm',''],['v','V','','f-li',''],['b','B','','f-li',''],
            ['n','N','','f-ri',''],['m','M','','f-ri',''],[',',',','<','f-rm',''],
            ['.','.','>' ,'f-rr',''],['/','/','?','f-rp',''],['Shift','Shift','','f-rp','w2']
        ],
        [ // Bottom controls
            ['Control','Ctrl','','f-lp','w3'],['Meta','Win','','f-lp','w3'],
            ['Alt','Alt','','f-th','w3'],[' ','Space','','f-th','space-key'],
            ['Alt','Alt','','f-th','w3'],['Meta','Win','','f-rp','w3'],
            ['Control','Ctrl','','f-rp','w3']
        ]
    ];

    // ===== State =====
    let mode = 'homeRow';
    let seq = [];
    let idx = 0;
    let results = [];       // all attempts: { key, correct }
    let passedKeys = [];    // passed targets: { key, hadError }
    let currentTargetMistakes = 0;
    let currentTargetHasError = false;
    let roundMistakes = 0;
    let roundTargetLen = BASE_SEQ_LEN;
    let reinforceQueue = [];         // { key, insertAt }
    let reinforcedPositions = new Set();
    let roundMistakeByKey = {};      // key -> count (round only)
    let t0 = null;          // start timestamp
    let timerID = null;
    let active = false;
    let heatmapOn = false;
    let statsPanelOpen = false;
    let sessionRange = '20';
    let statsResizeTimer = null;
    const keyElMap = {};    // dataKey → [elements]

    // ===== localStorage helpers =====
    function loadStats() {
        try {
            const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
            return (parsed && typeof parsed === 'object') ? parsed : {};
        }
        catch { return {}; }
    }
    function saveStats(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

    function toFiniteNumber(v, fallback = 0) {
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
    }

    function clamp(v, min, max) {
        return Math.min(max, Math.max(min, v));
    }

    function formatDuration(totalSec) {
        const sec = Math.max(0, Math.floor(toFiniteNumber(totalSec, 0)));
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function normalizeSessionMeta(raw) {
        const item = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
        return {
            version: SESSION_META_VERSION,
            totalSessions: Math.max(0, Math.floor(toFiniteNumber(item.totalSessions, 0))),
            bestKpm: Math.max(0, Math.round(toFiniteNumber(item.bestKpm, 0))),
            bestAccuracy: clamp(Math.round(toFiniteNumber(item.bestAccuracy, 0)), 0, 100)
        };
    }

    function loadSessionMeta() {
        try {
            const parsed = JSON.parse(localStorage.getItem(SESSION_META_STORAGE_KEY));
            return normalizeSessionMeta(parsed);
        } catch {
            return normalizeSessionMeta({});
        }
    }

    function saveSessionMeta(meta) {
        try {
            localStorage.setItem(SESSION_META_STORAGE_KEY, JSON.stringify(normalizeSessionMeta(meta)));
            return true;
        } catch {
            return false;
        }
    }

    function normalizeWrongByKey(raw) {
        const out = {};
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return out;
        Object.entries(raw).forEach(([k, v]) => {
            const n = Math.max(0, Math.floor(toFiniteNumber(v, 0)));
            if (n > 0) out[k] = n;
        });
        return out;
    }

    function normalizeSessionRecord(raw) {
        const item = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
        const modeName = (typeof item.mode === 'string' && (item.mode === 'allKeys' || Object.prototype.hasOwnProperty.call(POOLS, item.mode)))
            ? item.mode
            : 'homeRow';
        return {
            timestamp: Math.max(0, Math.floor(toFiniteNumber(item.timestamp, 0))),
            mode: modeName,
            targetLen: Math.max(0, Math.floor(toFiniteNumber(item.targetLen, 0))),
            attempts: Math.max(0, Math.floor(toFiniteNumber(item.attempts, 0))),
            accuracy: clamp(Math.round(toFiniteNumber(item.accuracy, 0)), 0, 100),
            kpm: Math.max(0, Math.round(toFiniteNumber(item.kpm, 0))),
            elapsedSec: Math.max(0, toFiniteNumber(item.elapsedSec, 0)),
            wrongByKey: normalizeWrongByKey(item.wrongByKey)
        };
    }

    function loadSessionHistory() {
        try {
            const parsed = JSON.parse(localStorage.getItem(SESSION_STORAGE_KEY));
            if (!Array.isArray(parsed)) return [];
            return parsed
                .map(normalizeSessionRecord)
                .filter(item => item.timestamp > 0);
        } catch {
            return [];
        }
    }

    function saveSessionHistory(history) {
        try {
            localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(Array.isArray(history) ? history : []));
            return true;
        } catch {
            return false;
        }
    }

    function syncSessionMetaWithHistory() {
        const history = loadSessionHistory();
        if (!history.length) {
            saveSessionMeta({ version: SESSION_META_VERSION, totalSessions: 0, bestKpm: 0, bestAccuracy: 0 });
            return;
        }
        let bestKpm = 0;
        let bestAccuracy = 0;
        history.forEach(item => {
            if (item.kpm > bestKpm) bestKpm = item.kpm;
            if (item.accuracy > bestAccuracy) bestAccuracy = item.accuracy;
        });
        saveSessionMeta({
            version: SESSION_META_VERSION,
            totalSessions: history.length,
            bestKpm,
            bestAccuracy
        });
    }

    function appendSessionRecord(payload) {
        const history = loadSessionHistory();
        const next = normalizeSessionRecord(payload);
        if (!next.timestamp) next.timestamp = Date.now();
        history.push(next);
        if (!saveSessionHistory(history)) return false;

        const prevMeta = loadSessionMeta();
        return saveSessionMeta({
            version: SESSION_META_VERSION,
            totalSessions: history.length,
            bestKpm: Math.max(prevMeta.bestKpm, next.kpm),
            bestAccuracy: Math.max(prevMeta.bestAccuracy, next.accuracy)
        });
    }

    function normalizeImportedKeyStats(raw) {
        const source = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
        const out = {};
        const isLikelyKeyStatsItem = value => {
            if (!value || typeof value !== 'object' || Array.isArray(value)) return false;
            const fields = ['total', 'errors', 'streakWrong', 'reinforceDebt', 'lastSeenAt'];
            return fields.some(name => Object.prototype.hasOwnProperty.call(value, name));
        };
        Object.entries(source).forEach(([key, value]) => {
            if (!key || typeof key !== 'string') return;
            if (!isLikelyKeyStatsItem(value)) return;
            out[key] = normalizeKeyStats(value);
        });
        return out;
    }

    function extractImportPayload(raw) {
        const obj = (raw && typeof raw === 'object' && !Array.isArray(raw)) ? raw : {};
        const hasStructuredPayload =
            Object.prototype.hasOwnProperty.call(obj, 'keyStats') ||
            Object.prototype.hasOwnProperty.call(obj, 'sessions') ||
            Object.prototype.hasOwnProperty.call(obj, STORAGE_KEY) ||
            Object.prototype.hasOwnProperty.call(obj, SESSION_STORAGE_KEY);

        const keyStatsRaw =
            (obj.keyStats && typeof obj.keyStats === 'object' && !Array.isArray(obj.keyStats)) ? obj.keyStats :
            (obj[STORAGE_KEY] && typeof obj[STORAGE_KEY] === 'object' && !Array.isArray(obj[STORAGE_KEY])) ? obj[STORAGE_KEY] :
            (!hasStructuredPayload ? obj : {});

        const sessionsRaw =
            Array.isArray(obj.sessions) ? obj.sessions :
            Array.isArray(obj[SESSION_STORAGE_KEY]) ? obj[SESSION_STORAGE_KEY] :
            [];

        const metaRaw =
            (obj.sessionMeta && typeof obj.sessionMeta === 'object' && !Array.isArray(obj.sessionMeta)) ? obj.sessionMeta :
            (obj[SESSION_META_STORAGE_KEY] && typeof obj[SESSION_META_STORAGE_KEY] === 'object' && !Array.isArray(obj[SESSION_META_STORAGE_KEY])) ? obj[SESSION_META_STORAGE_KEY] :
            {};

        return {
            keyStats: normalizeImportedKeyStats(keyStatsRaw),
            sessions: sessionsRaw.map(normalizeSessionRecord).filter(item => item.timestamp > 0),
            meta: normalizeSessionMeta(metaRaw)
        };
    }

    function buildSessionMetaFromHistory(history, fallbackMeta) {
        let bestKpm = 0;
        let bestAccuracy = 0;
        history.forEach(item => {
            if (item.kpm > bestKpm) bestKpm = item.kpm;
            if (item.accuracy > bestAccuracy) bestAccuracy = item.accuracy;
        });
        const fb = normalizeSessionMeta(fallbackMeta);
        return normalizeSessionMeta({
            version: SESSION_META_VERSION,
            totalSessions: history.length,
            bestKpm: Math.max(bestKpm, fb.bestKpm),
            bestAccuracy: Math.max(bestAccuracy, fb.bestAccuracy)
        });
    }

    function formatExportTimeName(d = new Date()) {
        const pad2 = n => String(n).padStart(2, '0');
        return `${d.getFullYear()}${pad2(d.getMonth() + 1)}${pad2(d.getDate())}-${pad2(d.getHours())}${pad2(d.getMinutes())}${pad2(d.getSeconds())}`;
    }

    function exportStatsData() {
        try {
            const payload = {
                schemaVersion: 1,
                source: 'huanfly-keyboard-practice',
                exportedAt: new Date().toISOString(),
                keyStats: loadStats(),
                sessions: loadSessionHistory(),
                sessionMeta: loadSessionMeta()
            };
            const json = JSON.stringify(payload, null, 2);
            const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `keyboard-practice-stats-${formatExportTimeName()}.json`;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error(err);
            alert('导出失败：当前浏览器不支持或数据异常。');
        }
    }

    function pickImportStatsFile() {
        const input = document.getElementById('stats-import-file');
        if (!input) return;
        input.value = '';
        input.click();
    }

    function writeImportedData(payload) {
        const backup = {
            keyStats: localStorage.getItem(STORAGE_KEY),
            sessions: localStorage.getItem(SESSION_STORAGE_KEY),
            sessionMeta: localStorage.getItem(SESSION_META_STORAGE_KEY)
        };
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(payload.keyStats));
            localStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(payload.sessions));
            localStorage.setItem(SESSION_META_STORAGE_KEY, JSON.stringify(payload.meta));
            return true;
        } catch (err) {
            console.error(err);
            try {
                if (backup.keyStats === null) localStorage.removeItem(STORAGE_KEY);
                else localStorage.setItem(STORAGE_KEY, backup.keyStats);
                if (backup.sessions === null) localStorage.removeItem(SESSION_STORAGE_KEY);
                else localStorage.setItem(SESSION_STORAGE_KEY, backup.sessions);
                if (backup.sessionMeta === null) localStorage.removeItem(SESSION_META_STORAGE_KEY);
                else localStorage.setItem(SESSION_META_STORAGE_KEY, backup.sessionMeta);
            } catch (rollbackErr) {
                console.error('rollback failed', rollbackErr);
            }
            return false;
        }
    }

    function handleImportStatsFile(event) {
        const input = event.target;
        const file = input && input.files && input.files[0];
        if (!file) return;

        if (!confirm('导入将覆盖当前统计数据，是否继续？')) {
            input.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = () => {
            try {
                const raw = JSON.parse(String(reader.result || '{}'));
                const imported = extractImportPayload(raw);
                const hasKeyStats = Object.keys(imported.keyStats).length > 0;
                const hasSessions = imported.sessions.length > 0;
                if (!hasKeyStats && !hasSessions) {
                    alert('导入失败：文件中未检测到可用统计数据。');
                    return;
                }

                imported.meta = buildSessionMetaFromHistory(imported.sessions, imported.meta);
                const ok = writeImportedData(imported);
                if (!ok) {
                    alert('导入失败：浏览器本地存储空间不足，或写入时发生异常。');
                    return;
                }

                updateHeatmap();
                renderWeakKeys();
                renderSessionStatsPanel();
                alert(`导入成功：键位统计 ${Object.keys(imported.keyStats).length} 项，轮次记录 ${imported.sessions.length} 条。`);
            } catch (err) {
                console.error(err);
                alert('导入失败：JSON 格式无效或数据结构不支持。');
            } finally {
                input.value = '';
            }
        };
        reader.onerror = () => {
            alert('导入失败：文件读取错误。');
            input.value = '';
        };
        reader.readAsText(file, 'utf-8');
    }

    function normalizeKeyStats(raw) {
        const item = (raw && typeof raw === 'object') ? raw : {};
        const toNum = v => Number.isFinite(Number(v)) ? Number(v) : 0;
        return {
            total: Math.max(0, Math.floor(toNum(item.total))),
            errors: Math.max(0, Math.floor(toNum(item.errors))),
            streakWrong: Math.max(0, Math.floor(toNum(item.streakWrong))),
            reinforceDebt: Math.max(0, toNum(item.reinforceDebt)),
            lastSeenAt: Math.max(0, Math.floor(toNum(item.lastSeenAt)))
        };
    }

    function errorRateOf(item) {
        return item.total > 0 ? item.errors / item.total : 0;
    }

    function getModePool(m) {
        if (m === 'allKeys') return Array.from(new Set(getAllKeys()));
        return POOLS[m] || POOLS.homeRow;
    }

    function recencyFactor(lastSeenAt) {
        if (!lastSeenAt) return 0.2;
        const age = Date.now() - lastSeenAt;
        if (age < 60 * 1000) return 1;
        if (age < 5 * 60 * 1000) return 0.7;
        if (age < 30 * 60 * 1000) return 0.45;
        return 0.25;
    }

    function recordResult(key, ok) {
        const s = loadStats();
        const item = normalizeKeyStats(s[key]);
        item.total++;
        item.lastSeenAt = Date.now();

        if (!ok) {
            item.errors++;
            item.streakWrong = Math.min(12, item.streakWrong + 1);
            item.reinforceDebt = Math.min(28, item.reinforceDebt + 1.2 + item.streakWrong * 0.85);
        } else {
            item.streakWrong = 0;
            item.reinforceDebt = Math.max(0, item.reinforceDebt - 1.4);
        }

        s[key] = item;
        saveStats(s);
    }

    // ===== Sequence Generation =====

    function weightForKey(key, statsMap) {
        const item = normalizeKeyStats(statsMap[key]);
        const longTerm = errorRateOf(item) * WEIGHT_CONFIG.longTermFactor;
        const recent = recencyFactor(item.lastSeenAt);
        const shortTerm = Math.min(item.streakWrong, WEIGHT_CONFIG.streakCap) * WEIGHT_CONFIG.streakFactor * recent;
        const debtTerm = Math.min(item.reinforceDebt, WEIGHT_CONFIG.debtCap) * WEIGHT_CONFIG.debtFactor * Math.max(recent, 0.35);
        const roundBoost = Math.min(7, (roundMistakeByKey[key] || 0) * 1.6);
        return 1 + longTerm + shortTerm + debtTerm + roundBoost;
    }

    function pickWeighted(pool, statsMap, prevKey) {
        const items = pool.map(key => {
            let w = weightForKey(key, statsMap);
            if (prevKey && key === prevKey) w *= 0.82;
            return { key, w: Math.max(0.1, w) };
        });
        const total = items.reduce((sum, it) => sum + it.w, 0);
        let r = Math.random() * total;
        for (const it of items) {
            r -= it.w;
            if (r <= 0) return it.key;
        }
        return items[items.length - 1].key;
    }

    function genSeq(m, length = BASE_SEQ_LEN) {
        const pool = getModePool(m);
        const statsMap = loadStats();
        const out = [];
        let prev = null;
        for (let i = 0; i < length; i++) {
            const nextKey = pickWeighted(pool, statsMap, prev);
            out.push(nextKey);
            prev = nextKey;
        }
        return out;
    }

    function ensureSequenceLength(targetLen) {
        const wanted = Math.min(MAX_SEQ_LEN, Math.max(BASE_SEQ_LEN, targetLen));
        if (seq.length >= wanted) return;
        const pool = getModePool(mode);
        const statsMap = loadStats();
        let prev = seq.length ? seq[seq.length - 1] : null;
        while (seq.length < wanted) {
            const nextKey = pickWeighted(pool, statsMap, prev);
            seq.push(nextKey);
            prev = nextKey;
        }
    }

    function computeGrowthStep(mistakes) {
        return 1 + Math.min(2, Math.floor(mistakes / 8));
    }

    function applyTieredLengthGrowth() {
        roundMistakes++;
        const step = computeGrowthStep(roundMistakes);
        roundTargetLen = Math.min(MAX_SEQ_LEN, roundTargetLen + step);
        ensureSequenceLength(roundTargetLen);
    }

    function pendingCountForKey(key) {
        return reinforceQueue.filter(item => item.key === key).length;
    }

    function scheduleImmediateReinforce(key) {
        if (pendingCountForKey(key) >= REINFORCE_CONFIG.maxPendingPerKey) return;
        if (reinforceQueue.length >= REINFORCE_CONFIG.maxQueueSize) return;

        const insertCount = Math.min(2, 1 + Math.floor(currentTargetMistakes / 2));
        for (let n = 0; n < insertCount; n++) {
            if (reinforceQueue.length >= REINFORCE_CONFIG.maxQueueSize) break;
            if (pendingCountForKey(key) >= REINFORCE_CONFIG.maxPendingPerKey) break;

            const gapBase = REINFORCE_CONFIG.minGap + Math.floor(Math.random() * (REINFORCE_CONFIG.maxGap - REINFORCE_CONFIG.minGap + 1));
            const insertAt = Math.min(roundTargetLen - 1, idx + gapBase + n * 2);
            if (insertAt <= idx) continue;

            const hasNearDuplicate = reinforceQueue.some(item =>
                item.key === key && Math.abs(item.insertAt - insertAt) <= 1
            );
            if (hasNearDuplicate) continue;

            reinforceQueue.push({ key, insertAt });
        }
        reinforceQueue.sort((a, b) => a.insertAt - b.insertAt);
    }

    function refreshFutureSequence() {
        if (!active || idx >= seq.length - 1) return;
        ensureSequenceLength(roundTargetLen);
        const pool = getModePool(mode);
        const statsMap = loadStats();
        reinforcedPositions = new Set();
        reinforceQueue = reinforceQueue.filter(item => item.insertAt > idx);
        let prev = seq[idx];
        for (let i = idx + 1; i < seq.length; i++) {
            const forcedIndex = reinforceQueue.findIndex(item => item.insertAt <= i && item.key !== prev);
            if (forcedIndex !== -1) {
                const forced = reinforceQueue.splice(forcedIndex, 1)[0];
                seq[i] = forced.key;
                reinforcedPositions.add(i);
                prev = forced.key;
                continue;
            }
            const nextKey = pickWeighted(pool, statsMap, prev);
            seq[i] = nextKey;
            prev = nextKey;
        }
    }

    // ===== Display Helpers =====
    function esc(s) {
        return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function displayName(key) {
        return DISPLAY_NAME[key] || key;
    }

    // ===== Build Virtual Keyboard =====
    function buildKeyboard() {
        const el = document.getElementById('virtual-keyboard');
        let html = '';
        KB_ROWS.forEach(row => {
            html += '<div class="kb-row">';
            row.forEach(([dk, label, slabel, fc, wc]) => {
                const cls = ['kb-key', fc, wc].filter(Boolean).join(' ');
                const sh = slabel ? `<span class="shift-char">${esc(slabel)}</span>` : '';
                html += `<div class="${cls}" data-key="${esc(dk)}">${sh}${esc(label)}</div>`;
            });
            html += '</div>';
        });
        el.innerHTML = html;

        // Build element lookup map
        Object.keys(keyElMap).forEach(k => delete keyElMap[k]);
        el.querySelectorAll('.kb-key').forEach(e => {
            const k = e.dataset.key;
            (keyElMap[k] || (keyElMap[k] = [])).push(e);
        });
    }

    function getKeyEls(key) { return keyElMap[key] || []; }

    // ===== Keyboard Highlighting =====
    function clearTarget() {
        document.querySelectorAll('.kb-key').forEach(e => e.classList.remove('target', 'target-wrong'));
    }

    function highlightTarget(targetKey) {
        clearTarget();
        if (!targetKey) return;

        let base = targetKey;
        let needShift = false;

        if (targetKey.length === 1 && targetKey >= 'A' && targetKey <= 'Z') {
            base = targetKey.toLowerCase();
            needShift = true;
        } else if (SHIFT_BASE[targetKey]) {
            base = SHIFT_BASE[targetKey];
            needShift = true;
        }

        const addTargetState = el => {
            el.classList.add('target');
            if (currentTargetHasError) el.classList.add('target-wrong');
        };

        getKeyEls(base).forEach(addTargetState);
        if (needShift) getKeyEls('Shift').forEach(addTargetState);
    }

    function flashPress(eventKey, isWrong = false) {
        let base = eventKey;
        if (eventKey.length === 1 && eventKey >= 'A' && eventKey <= 'Z') base = eventKey.toLowerCase();
        else if (SHIFT_BASE[eventKey]) base = SHIFT_BASE[eventKey];

        const els = [];
        const addUnique = (arr) => {
            arr.forEach(el => {
                if (!els.includes(el)) els.push(el);
            });
        };
        addUnique(getKeyEls(base));
        if (eventKey === 'Shift' || eventKey === 'Control' || eventKey === 'Alt') {
            addUnique(getKeyEls(eventKey));
        }

        els.forEach(e => {
            e.classList.remove('pressed', 'wrong-press');
            void e.offsetWidth;
            e.classList.add('pressed');
            if (isWrong) e.classList.add('wrong-press');
            setTimeout(() => e.classList.remove('pressed'), 130);
            if (isWrong) {
                setTimeout(() => e.classList.remove('wrong-press'), 240);
            }
        });
    }

    // ===== Heatmap =====
    function updateHeatmap() {
        document.querySelectorAll('.kb-key').forEach(e => {
            e.classList.remove('heat-1','heat-2','heat-3');
        });
        if (!heatmapOn) return;
        const stats = loadStats();
        document.querySelectorAll('.kb-key').forEach(e => {
            const item = normalizeKeyStats(stats[e.dataset.key]);
            if (item.total >= 5) {
                const r = errorRateOf(item);
                if (r > 0.30) e.classList.add('heat-3');
                else if (r > 0.15) e.classList.add('heat-2');
                else if (r > 0.05) e.classList.add('heat-1');
            }
        });
    }

    // ===== Render Queue =====
    function renderQueue() {
        const doneEl = document.getElementById('done-keys');
        const upEl = document.getElementById('upcoming-keys');
        const sep = document.getElementById('queue-sep');

        let doneHtml = '';
        const start = Math.max(0, passedKeys.length - 6);
        for (let i = start; i < passedKeys.length; i++) {
            const done = passedKeys[i];
            const c = done.hadError ? 'done-wrong' : 'done-correct';
            doneHtml += `<span class="queue-key ${c}">${esc(displayName(done.key))}</span>`;
        }
        doneEl.innerHTML = doneHtml;

        let upHtml = '';
        const end = Math.min(seq.length, idx + 7);
        for (let i = idx + 1; i < end; i++) {
            const opacity = 1 - (i - idx - 1) * 0.12;
            const reinforced = reinforcedPositions.has(i) ? ' reinforced' : '';
            upHtml += `<span class="queue-key upcoming${reinforced}" style="opacity:${Math.max(0.2, opacity)}">${esc(displayName(seq[i]))}</span>`;
        }
        upEl.innerHTML = upHtml;

        sep.style.display = (doneHtml || upHtml) ? '' : 'none';
    }

    function renderCurrent() {
        const el = document.getElementById('current-key-display');
        if (idx >= seq.length) {
            el.innerHTML = '<span class="start-prompt">已完成</span>';
            return;
        }
        const errorCls = currentTargetHasError ? ' error-state' : '';
        el.innerHTML = `<span class="key-label${errorCls}">${esc(displayName(seq[idx]))}</span>`;
    }

    function updateProgress() {
        const pct = seq.length ? (idx / seq.length) * 100 : 0;
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('stat-progress').textContent = `${idx}/${seq.length}`;
    }

    function updateAccuracy() {
        if (!results.length) { document.getElementById('stat-accuracy').textContent = '-'; return; }
        const ok = results.filter(r => r.correct).length;
        document.getElementById('stat-accuracy').textContent = Math.round(ok / results.length * 100) + '%';
    }

    function updateTimer() {
        if (!t0) return;
        const s = (Date.now() - t0) / 1000;
        const m = Math.floor(s / 60);
        const ss = Math.floor(s % 60);
        document.getElementById('stat-time').textContent = `${m}:${ss.toString().padStart(2,'0')}`;
        if (s > 0 && results.length) {
            document.getElementById('stat-kpm').textContent = Math.round(results.length / (s / 60));
        }
    }

    // ===== Weak Keys Panel =====
    function renderWeakKeys() {
        const stats = loadStats();
        const panel = document.getElementById('weak-keys-panel');
        const list = document.getElementById('weak-keys-list');

        const weak = Object.entries(stats)
            .map(([k, s]) => ({ key: k, item: normalizeKeyStats(s) }))
            .filter((entry) => entry.item.total >= 5 && entry.item.errors > 0)
            .map(({ key, item }) => ({ key, rate: errorRateOf(item), total: item.total }))
            .sort((a, b) => b.rate - a.rate)
            .slice(0, 5);

        if (!weak.length) { panel.style.display = 'none'; return; }
        panel.style.display = '';

        list.innerHTML = weak.map(w => {
            const pct = Math.round(w.rate * 100);
            return `<div class="weak-key-item">
                <span class="weak-key-name">${esc(displayName(w.key))}</span>
                <div class="weak-key-bar"><div class="weak-key-fill" style="width:${pct}%"></div></div>
                <span class="weak-key-rate">${pct}% 错</span>
            </div>`;
        }).join('');
    }

    function averageAccuracy(history, count = 7) {
        if (!history.length) return null;
        const samples = history.slice(-Math.max(1, count));
        const sum = samples.reduce((acc, item) => acc + item.accuracy, 0);
        return Math.round(sum / samples.length);
    }

    function pickSessionsByRange(history, range) {
        if (range === 'all') return history;
        const n = Math.max(1, Math.floor(toFiniteNumber(range, 20)));
        return history.slice(-n);
    }

    function downsampleSessions(history, maxPoints = SESSION_RENDER_MAX_POINTS) {
        if (history.length <= maxPoints) return history;
        const sampled = [];
        const step = (history.length - 1) / (maxPoints - 1);
        for (let i = 0; i < maxPoints; i++) {
            const idx = Math.min(history.length - 1, Math.round(i * step));
            const picked = history[idx];
            if (!sampled.length || sampled[sampled.length - 1] !== picked) sampled.push(picked);
        }
        if (sampled[sampled.length - 1] !== history[history.length - 1]) {
            sampled.push(history[history.length - 1]);
        }
        return sampled;
    }

    function formatShortDate(ts) {
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return '-';
        const hh = d.getHours().toString().padStart(2, '0');
        const mm = d.getMinutes().toString().padStart(2, '0');
        return `${d.getMonth() + 1}/${d.getDate()} ${hh}:${mm}`;
    }

    function buildLinePath(values, xAt, yAt) {
        if (!values.length) return '';
        let path = '';
        for (let i = 0; i < values.length; i++) {
            const cmd = i === 0 ? 'M' : 'L';
            path += `${cmd} ${xAt(i).toFixed(2)} ${yAt(values[i]).toFixed(2)} `;
        }
        return path.trim();
    }

    function renderTrendChart(history) {
        const chart = document.getElementById('trend-chart');
        const empty = document.getElementById('trend-empty');
        if (!chart || !empty) return;

        if (history.length < 2) {
            chart.innerHTML = '';
            empty.style.display = '';
            return;
        }

        empty.style.display = 'none';
        const data = downsampleSessions(history);
        const width = Math.max(420, chart.clientWidth || 640);
        const height = 220;
        const pad = { top: 14, right: 34, bottom: 28, left: 34 };
        const innerW = Math.max(40, width - pad.left - pad.right);
        const innerH = Math.max(40, height - pad.top - pad.bottom);
        const size = Math.max(1, data.length - 1);
        const xAt = i => pad.left + (i / size) * innerW;

        const accValues = data.map(item => clamp(item.accuracy, 0, 100));
        const kpmValues = data.map(item => Math.max(0, item.kpm));
        const kpmPeak = Math.max(20, ...kpmValues);
        const kpmMax = Math.ceil(kpmPeak / 10) * 10;

        const yAccAt = v => pad.top + (1 - clamp(v, 0, 100) / 100) * innerH;
        const yKpmAt = v => {
            const pct = kpmMax <= 0 ? 0 : clamp(v, 0, kpmMax) / kpmMax;
            return pad.top + (1 - pct) * innerH;
        };

        const accPath = buildLinePath(accValues, xAt, yAccAt);
        const kpmPath = buildLinePath(kpmValues, xAt, yKpmAt);
        const lastX = xAt(data.length - 1);
        const lastAccY = yAccAt(accValues[accValues.length - 1]);
        const lastKpmY = yKpmAt(kpmValues[kpmValues.length - 1]);

        let grid = '';
        for (let i = 0; i <= 4; i++) {
            const t = i / 4;
            const y = pad.top + t * innerH;
            const accTick = Math.round((1 - t) * 100);
            const kpmTick = Math.round((1 - t) * kpmMax);
            grid += `
                <line x1="${pad.left}" y1="${y.toFixed(2)}" x2="${(width - pad.right).toFixed(2)}" y2="${y.toFixed(2)}" stroke="#e8ecea" stroke-width="1"/>
                <text x="${(pad.left - 6).toFixed(2)}" y="${(y + 3).toFixed(2)}" text-anchor="end" font-size="10" fill="#8b98a7">${accTick}</text>
                <text x="${(width - pad.right + 6).toFixed(2)}" y="${(y + 3).toFixed(2)}" text-anchor="start" font-size="10" fill="#8b98a7">${kpmTick}</text>
            `;
        }

        const startLabel = formatShortDate(data[0].timestamp);
        const endLabel = formatShortDate(data[data.length - 1].timestamp);

        chart.innerHTML = `
            <svg viewBox="0 0 ${width} ${height}" preserveAspectRatio="none" role="img" aria-label="练习进步曲线">
                <defs>
                    <linearGradient id="accLine" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#16a34a"/>
                        <stop offset="100%" stop-color="#22c55e"/>
                    </linearGradient>
                    <linearGradient id="kpmLine" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#2563eb"/>
                        <stop offset="100%" stop-color="#3b82f6"/>
                    </linearGradient>
                </defs>
                ${grid}
                <path d="${accPath}" fill="none" stroke="url(#accLine)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="${kpmPath}" fill="none" stroke="url(#kpmLine)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="${lastX.toFixed(2)}" cy="${lastAccY.toFixed(2)}" r="3.5" fill="#16a34a"/>
                <circle cx="${lastX.toFixed(2)}" cy="${lastKpmY.toFixed(2)}" r="3.5" fill="#2563eb"/>
                <text x="${pad.left}" y="${height - 8}" font-size="10" fill="#8b98a7">${startLabel}</text>
                <text x="${width - pad.right}" y="${height - 8}" text-anchor="end" font-size="10" fill="#8b98a7">${endLabel}</text>
            </svg>
        `;
    }

    function renderSessionStatsPanel() {
        const history = loadSessionHistory();
        const meta = loadSessionMeta();

        const total = Math.max(history.length, meta.totalSessions);
        const bestAccuracyComputed = history.reduce((m, item) => Math.max(m, item.accuracy), 0);
        const bestKpmComputed = history.reduce((m, item) => Math.max(m, item.kpm), 0);
        const bestAccuracy = Math.max(meta.bestAccuracy, bestAccuracyComputed);
        const bestKpm = Math.max(meta.bestKpm, bestKpmComputed);
        const recentAcc = averageAccuracy(history, 7);
        const latest = history[history.length - 1];
        const latestMode = latest ? (MODE_LABELS[latest.mode] || latest.mode) : '';

        const totalEl = document.getElementById('sum-total-sessions');
        totalEl.textContent = total;
        totalEl.title = latestMode ? `最近模式：${latestMode}` : '';
        document.getElementById('sum-best-accuracy').textContent = bestAccuracy > 0 ? `${bestAccuracy}%` : '-';
        document.getElementById('sum-best-kpm').textContent = bestKpm > 0 ? String(bestKpm) : '-';
        document.getElementById('sum-recent-accuracy').textContent = recentAcc === null ? '-' : `${recentAcc}%`;

        const visibleHistory = pickSessionsByRange(history, sessionRange);
        renderTrendChart(visibleHistory);
    }

    function toggleStatsPanel() {
        statsPanelOpen = !statsPanelOpen;
        const panel = document.getElementById('session-stats-panel');
        const btn = document.getElementById('btn-stats-panel');
        panel.style.display = statsPanelOpen ? '' : 'none';
        btn.classList.toggle('btn-outline', !statsPanelOpen);
        if (statsPanelOpen) renderSessionStatsPanel();
    }

    function setCurrentErrorState(isError) {
        currentTargetHasError = isError;
        const label = document.querySelector('#current-key-display .key-label');
        if (label) label.classList.toggle('error-state', isError);
    }

    function flashCurrentLabel(ok) {
        const label = document.querySelector('#current-key-display .key-label');
        if (!label) return;
        label.classList.remove('correct-flash', 'wrong-flash');
        void label.offsetWidth;
        label.classList.add(ok ? 'correct-flash' : 'wrong-flash');
        setTimeout(() => label.classList.remove(ok ? 'correct-flash' : 'wrong-flash'), ok ? 360 : 420);
    }

    // ===== Input Handling =====
    document.addEventListener('keydown', function(e) {
        const overlayShown = document.getElementById('completion-overlay').classList.contains('show');
        if (overlayShown && (e.code === 'Space' || e.key === ' ')) {
            e.preventDefault();
            closeCompletion();
            return;
        }

        if (!active) return;
        if (e.code === 'Space' && e.repeat) {
            e.preventDefault();
            return;
        }
        e.preventDefault();

        const target = seq[idx];
        const pressed = e.key;

        // Ignore modifier-only presses when target is not a modifier
        if (!MODIFIERS.has(target) && MODIFIERS.has(pressed)) {
            flashPress(pressed);
            return;
        }

        const ok = pressed === target;
        flashPress(pressed, !ok);

        results.push({ key: target, correct: ok });
        recordResult(target, ok);

        if (ok) {
            setCurrentErrorState(false);
            flashCurrentLabel(true);
            passedKeys.push({ key: target, hadError: currentTargetMistakes > 0 });
            currentTargetMistakes = 0;
            if (roundMistakeByKey[target]) {
                roundMistakeByKey[target] = Math.max(0, roundMistakeByKey[target] - 1);
            }
            idx++;
        } else {
            currentTargetMistakes++;
            roundMistakeByKey[target] = (roundMistakeByKey[target] || 0) + 1;
            applyTieredLengthGrowth();
            scheduleImmediateReinforce(target);
            setCurrentErrorState(true);
            flashCurrentLabel(false);
        }

        refreshFutureSequence();

        updateAccuracy();
        updateProgress();
        renderQueue();

        if (idx >= seq.length) {
            completePractice();
        } else {
            if (ok) renderCurrent();
            highlightTarget(seq[idx]);
        }
    });

    // ===== Practice Flow =====
    function startNewPractice() {
        roundMistakes = 0;
        roundTargetLen = BASE_SEQ_LEN;
        reinforceQueue = [];
        reinforcedPositions = new Set();
        roundMistakeByKey = {};
        seq = genSeq(mode, roundTargetLen);
        idx = 0;
        results = [];
        passedKeys = [];
        currentTargetMistakes = 0;
        currentTargetHasError = false;
        t0 = Date.now();
        active = true;

        if (timerID) clearInterval(timerID);
        timerID = setInterval(updateTimer, 500);

        document.getElementById('stat-accuracy').textContent = '-';
        document.getElementById('stat-kpm').textContent = '-';
        document.getElementById('stat-time').textContent = '0:00';

        const area = document.getElementById('practice-area');
        area.style.opacity = '0.6';
        setTimeout(() => area.style.opacity = '1', 80);

        renderCurrent();
        renderQueue();
        updateProgress();
        highlightTarget(seq[idx]);
        updateHeatmap();
        renderWeakKeys();

        area.focus();
    }

    function completePractice() {
        active = false;
        if (timerID) { clearInterval(timerID); timerID = null; }
        updateTimer();
        clearTarget();
        setCurrentErrorState(false);
        renderCurrent();

        const okCount = results.filter(r => r.correct).length;
        const acc = results.length ? Math.round(okCount / results.length * 100) : 100;
        const elapsed = (Date.now() - t0) / 1000;
        const kpm = elapsed > 0 ? Math.round(results.length / (elapsed / 60)) : 0;

        document.getElementById('comp-accuracy').textContent = acc + '%';
        document.getElementById('comp-time').textContent = formatDuration(elapsed);
        document.getElementById('comp-kpm').textContent = kpm;

        // Wrong keys in this round
        const wrong = {};
        results.forEach(r => { if (!r.correct) wrong[r.key] = (wrong[r.key] || 0) + 1; });
        const compWeak = document.getElementById('comp-weak-keys');
        const entries = Object.entries(wrong).sort((a,b) => b[1] - a[1]);

        if (entries.length) {
            compWeak.innerHTML =
                '<p style="font-size:0.85rem;color:var(--light-text);margin-bottom:6px;">本轮错误键：</p>' +
                entries.map(([k, n]) => `<span class="comp-wrong-tag">${esc(displayName(k))} &times;${n}</span>`).join('');
        } else {
            compWeak.innerHTML = '<p class="comp-perfect">全部正确！</p>';
        }

        const sessionSaved = appendSessionRecord({
            timestamp: Date.now(),
            mode,
            targetLen: seq.length,
            attempts: results.length,
            accuracy: acc,
            kpm,
            elapsedSec: elapsed,
            wrongByKey: wrong
        });
        if (!sessionSaved) {
            console.warn('session stats not saved (storage may be full)');
        }
        if (statsPanelOpen) renderSessionStatsPanel();

        document.getElementById('completion-overlay').classList.add('show');
        updateHeatmap();
        renderWeakKeys();
    }

    function closeCompletion() {
        document.getElementById('completion-overlay').classList.remove('show');
        startNewPractice();
    }

    // ===== Mode Selection =====
    document.getElementById('mode-selector').addEventListener('click', function(e) {
        const btn = e.target.closest('.mode-btn');
        if (!btn) return;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        mode = btn.dataset.mode;
        startNewPractice();
    });

    document.getElementById('session-range-group').addEventListener('click', function(e) {
        const btn = e.target.closest('.range-btn');
        if (!btn) return;
        const range = btn.dataset.range;
        if (!range || range === sessionRange) return;
        sessionRange = range;
        document.querySelectorAll('#session-range-group .range-btn').forEach(el => {
            el.classList.toggle('active', el === btn);
        });
        if (statsPanelOpen) renderSessionStatsPanel();
    });

    document.getElementById('stats-import-file').addEventListener('change', handleImportStatsFile);

    window.addEventListener('resize', function() {
        if (!statsPanelOpen) return;
        if (statsResizeTimer) clearTimeout(statsResizeTimer);
        statsResizeTimer = setTimeout(renderSessionStatsPanel, 140);
    });

    // ===== Controls =====
    function toggleHeatmap() {
        heatmapOn = !heatmapOn;
        const btn = document.getElementById('btn-heatmap');
        btn.classList.toggle('btn-outline', !heatmapOn);
        updateHeatmap();
    }

    function resetAllData() {
        if (!confirm('确定要清除所有练习记录吗？此操作不可撤销。')) return;
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(SESSION_STORAGE_KEY);
        localStorage.removeItem(SESSION_META_STORAGE_KEY);
        updateHeatmap();
        renderWeakKeys();
        renderSessionStatsPanel();
    }

    // ===== Init =====
    syncSessionMetaWithHistory();
    buildKeyboard();
    renderWeakKeys();
    renderSessionStatsPanel();
    startNewPractice();
    </script>
